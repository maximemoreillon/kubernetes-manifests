apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: versitygw-s3
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: versitygw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: versitygw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: versitygw
    spec:
      containers:
        - name: versitygw
          image: ghcr.io/versity/versitygw:latest
          env:
            - name: VGW_BACKEND
              value: posix
            - name: VGW_BACKEND_ARGS
              value: /data/s3
            # TODO: ExternalSecret
            - name: ROOT_ACCESS_KEY
              value: myaccesskey
            - name: ROOT_SECRET_KEY
              value: mysecretkey
            - name: VGW_ADMIN_PORT
              value: ":7071"
            - name: VGW_WEBUI_PORT
              value: ":8080"
            # - name: VGW_WEBUI_GATEWAYS
            # value: "http://your-versitygw-s3-url"
            # - name: VGW_WEBUI_ADMIN_GATEWAYS
            # value: "http://your-versitygw-admin-url"
          volumeMounts:
            - mountPath: /data/s3
              name: s3
          resources: {}

      volumes:
        - name: s3
          persistentVolumeClaim:
            claimName: versitygw-s3
---
apiVersion: v1
kind: Service
metadata:
  name: versitygw
spec:
  ports:
    - name: s3
      port: 7070
    - name: admin
      port: 7071
    - name: ui
      port: 8080
  selector:
    app.kubernetes.io/name: versitygw
  type: ClusterIP
